<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المشرف - عبد الرحمن</title>
    <style>
        body { background: #0b141d; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #1c1f26; padding: 35px; border-radius: 20px; border: 1px solid #30363d; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.6); width: 340px; }
        input { width: 100%; padding: 12px; margin: 8px 0; background: #0d1117; color: white; border: 1px solid #444; border-radius: 10px; text-align: center; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 14px; background: #1e40af; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        #err { color: #ef4444; font-size: 12px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>أهلاً بك يا أستاذ عبد الرحمن 👋</h2>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
        <div id="err">البيانات غلط!</div>
    </div>
    <script>
        function login() {
            var u = document.getElementById('user').value;
            var p = document.getElementById('pass').value;
            // البيانات التي طلبتها
            if(u === "01153297929" && p === "Abdo@011") {
                sessionStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html";
            } else { document.getElementById('err').style.display = "block"; }
        }
    </script>
</body>
</html>
