<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - عبد الرحمن</title>
    <style>
        body { background-color: #0b141d; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { background: #1c1f26; padding: 25px; border-radius: 15px; border: 1px solid #30363d; max-width: 400px; margin: auto; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; color: white; font-weight: bold; text-decoration: none; cursor: pointer; font-size: 14px; box-sizing: border-box; }
        .blue { background: #1e40af; }
        .green { background: #059669; }
        .purple { background: #8b5cf6; }
        .logout { background: #ef4444; margin-top: 20px; }
    </style>
    <script>
        if (sessionStorage.getItem("isLoggedIn") !== "true") { window.location.href = "login.html"; }
        function logout() { sessionStorage.removeItem("isLoggedIn"); window.location.href = "index.html"; }
    </script>
</head>
<body>
    <div class="box">
        <h1>أهلاً بك يا عبد الرحمن! 👑</h1>
        <p>إدارة الموقع والدردشة:</p>
        
        <a href="partners_edit.html" class="btn blue">👥 إدارة الشركاء</a>
        <a href="bot_edit.html" class="btn blue">🤖 إعدادات البوت</a>
        
        <a href="logs.html" class="btn green">📋 سجل زوار الموقع</a>
        
        <a href="chat_monitor.html" class="btn purple">💬 مراقبة دردشة البوت</a>
        
        <button class="btn logout" onclick="logout()">تسجيل الخروج 🔐</button>
    </div>
</body>
</html>
